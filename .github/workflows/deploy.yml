name: 自动部署到云服务器

on:
  push:
    branches:
      - main  # 只有 push 到 main 分支才触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 登录服务器并更新
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/production-system
            bash /root/update.sh
